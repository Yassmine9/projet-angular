<div class="page-container">

  <!-- Sidebar with chapter navigation -->
  <div class="sidebar" *ngIf="chapters$ | async as chapters">
    <div class="sidebar-header">
      <h3 class="sidebar-title">
        <img src="assets/chapter-icon.png" alt="Chapitres" class="sidebar-icon">
        Chapitres
      </h3>
    </div>
    <div class="chapters-list">
      <!-- Individual chapters only - removed "Tous les chapitres" -->
      <button 
        *ngFor="let chapter of chapters" 
        class="sidebar-chapter"
        [class.active]="activeChapterId === chapter.chapterId"
        (click)="filterChapter(chapter.chapterId)">
        <span class="chapter-number">{{ chapter.chapterId }}</span>
        <span class="chapter-name">{{ chapter.chapterTitle }}</span>
      </button>
    </div>
  </div>

  <!-- Main content area -->
  <div class="main-content">
    <div class="chapters-container">

      <!-- Display filtered chapters -->
      <section 
        *ngFor="let chapter of filteredChapters" 
        class="chapter" 
        [id]="'chapter-' + chapter.chapterId">

        <!-- Chapter title -->
        <h2 class="chapter-title">
          Chapitre {{ chapter.chapterId }} : {{ chapter.chapterTitle }}
        </h2>

        <!-- Cards grid -->
        <div class="chapter-cards">

          <!-- Existing concept cards FIRST -->
          <div 
            *ngFor="let card of chapter.cards" 
            class="card flip-card"
            [class.flipped]="expandedCardId === card.id">

            <div class="flip-card-inner">

              <!-- Front of card -->
              <div class="flip-card-front">

                <div class="card-header">
                  <div class="card-title-wrapper">
                    <h3 class="card-title">{{ card.title }}</h3>
                  </div>

                  <!-- Action buttons -->
                  <div class="card-actions">
                    <button class="btn btn-details" (click)="toggleDetails(card.id)">
                      Détails
                    </button>
                    <button class="btn btn-edit" (click)="editConcept(card.id)">
                      Modifier
                    </button>
                    <button 
                      class="btn btn-delete"
                      (click)="deleteConcept(card.id, chapter.chapterId)">
                      Supprimer
                    </button>
                  </div>
                </div>

                <p class="card-description">{{ card.description }}</p>

                <!-- Practice button -->
                <div class="card-footer">
                  <button class="btn btn-game" (click)="goToGame(card.id)">
                    <img src="assets/practice-icon.png" alt="Pratiquer" class="practice-icon">
                    Pratiquer ce concept
                  </button>
                </div>

              </div>

              <!-- Back of card -->
              <div class="flip-card-back">

                <h4>📝 Résumé</h4>
                <p>{{ card.summary }}</p>

                <h4>💡 Exemples</h4>
                <div *ngFor="let ex of card.examples">
                  <strong>{{ ex.label }}</strong>
                  <pre><code>{{ ex.blocks.join('\n') }}</code></pre>
                </div>

                <button 
                  class="btn btn-details"
                  (click)="toggleDetails(card.id)">
                  ← Retour
                </button>

              </div>

            </div>
          </div>

          <!-- Add Concept Card LAST -->
          <a routerLink="/add" class="add-concept-card">
            <div class="add-concept-icon">+</div>
            <div class="add-concept-content">
              <h3 class="add-concept-title">Ajouter un concept</h3>
              <p class="add-concept-description">
                Cliquez pour <strong>créer un nouveau concept</strong> dans ce chapitre
              </p>
            </div>
          </a>

        </div>

      </section>

    </div>
  </div>

</div>
